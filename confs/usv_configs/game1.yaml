seed: &seed 7 # set experiment seed
timestep: &timestep 0.1  #20
horizon: &horizon 10 #10
friction: &friction 0.05
min_obs: 5 #number of steps to run in sim eppisode before deploying policy
logdir: test1
notes: position no noise schedule

alg:
  lr : 0.0001 
  nenvs : 12
  pi : [512, 512]
  vf : [512, 512]
  timesteps : 15e6

env:
  max_episode_length: 2048
  ctrl_scale: 30
  distance_tol: 500
  seed: *seed

sim:
  n: 3 #number of pursuit boats
  starting_config: circle #starting configuration of pursuit boats
  init_params:
    min_dist: 100 #100 #minimum distance of pursuit boats from target boat when starting
    max_dist: 200 #200 #maximum distance of pursuit boats from target boat when starting

boats:

  target:
    inertial_data:
      J_b: 3e4
      mass: 4000
      length: 10
      friction: 0.05
    thrust_range: [-75, 75]
    torque_range: [-75, 75]
    initial_state_data:
      position: [0.0, 0.0]
      velocity: [0.0, 0.0]
      heading: [0.0]
      angular_velocity: [0.0]
    mpc:
      N: 3
      control_range: [700, 0, 5.0]

  chaser0:
    inertial_data:
      J_b: 3e4
      mass: 4000
      length: 10
      friction: *friction
