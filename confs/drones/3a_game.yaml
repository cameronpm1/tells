seed: &seed 22 # set experiment seed
timestep: &timestep 0.5
horizon: &horizon 10 #10
logdir: logs/marl/dtest6
notes: new controller params

alg:
  type : ppo
  lr : 0.00002
  gamma: 0.99
  nenvs : 2
  cpu_envs: 8
  num_cpus_per_env_runner: 0.25
  num_cpus_for_main_process: 24
  rollout_fragment_length: auto
  batch_mode: truncate_episodes
  sample_timeout_s: 120
  target_ent: 0.1
  batch: 4096
  batch_size: 256
  num_gpus: 0
  pi : [512, 512, 512]
  vf : [512, 512, 512]
  timesteps : 4000
  checkpoint_freq: 100
  minibatch_size: 512
  num_epochs: 5
  lambda: 0.95
  entropy_coeff: 0.0
  clip_param: 0.05
  vf_clip_param: 10.0
  grad_clip: 0.25
  pretrain:
    enabled: true
    episodes: 1800
    epochs: 48
    batch_size: 2048
    lr: 0.0005
    value_loss_coef: 0.02
    grad_clip: 1.0
    eval_runs: 8
    workers: 100
    nenvs: 0
    cpu_envs: 1

env:
  scenario: 3_agent_drones
  max_episode_length: 800
  agent_list: ['target', 'agent0', 'agent1', 'agent2']
  learned_agent_list: ['agent0', 'agent1', 'agent2']
  env_kwargs:
    grid_size : 3.0
    capture_radius : 0.45
    base_altitude : 1.0
    speed_ratio : 0.3
    pursuer_speed_fraction: 1.5
    target_force_threshold : 0.9
    pursuer_spawn_min_radius: 1.0
    pursuer_spawn_max_radius: 2.0
    pursuer_same_spawn: true
    pursuer_same_spawn_jitter: 0.05
    target_spawn_radius: 2.3
    spawn_altitude_jitter: 0.05
    goal_noise: 0.1
    global_observations: true
    role_conditioned_slots: true
  controller_kwargs:
    target_avoid_radius: 0.5
    target_avoid_gain: 1.6
    force_exponent: 2.0
    altitude_gain: 0.35
  reward_kwargs:
    distance_scale: 7.0
    chase_scale: 0.25
    progress_scale: 52.0
    approach_scale: 3.0
    containment_scale: 5.0
    coverage_scale: 16.0
    slot_scale: 14.0
    hold_scale: 80.0
    success_bonus: 2500.0
    oob_penalty: 7000.0
    uncontrolled_goal_scale: 36.0
    touch_penalty_scale: 4.0
    altitude_scale: 1.0
    step_cost: 0.05
    goal_focus_temp: 1.2
    surround_radius: 1.35
    ideal_radius: 1.0
    radius_tolerance: 0.85
    hold_goal_radius: 0.45
    hold_coverage_min: 0.3
    hold_close_fraction: 0.34
    hold_ring_min: 0.05
    hold_slot_min: 0.05
    goal_center_radius: 1.6
    goal_center_scale: 44.0
    goal_lock_radius: 0.7
    goal_lock_scale: 130.0
    success_hold_steps: 8
    slot_far_distance: 1.75
    slot_funnel_backoff: 1.55
    slot_funnel_lateral: 1.1
    slot_gather_distance: 1.2
    slot_gather_backoff: 1.25
    slot_gather_lateral: 0.95
    slot_switch_distance: 0.9
    slot_push_radius: 0.4
    slot_push_offset: 0.3
    slot_flank_radius: 0.4
    slot_goal_backoff: 0.45
    slot_goal_lateral: 0.35
    slot_tolerance: 1.05
    safe_target_radius: 0.18

sim:
  n: 3 #number of pursuit agents

policy_list: ['agent0']
